---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  flate:
    name: Flate
    needs: filter
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kind:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false
          tool_versions: |
            github:home-operations/flate latest

      - name: Run flate diff
        env:
          KIND: ${{ matrix.kind }}
        run: |
          flate diff "$KIND" --path ./kubernetes/flux/cluster --output github > "$KIND.diff"
          [ -s "$KIND.diff" ] || rm "$KIND.diff"

      - name: Upload diff
        if: ${{ hashFiles(format('{0}.diff', matrix.kind)) != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flate-diff-${{ matrix.kind }}
          path: ${{ matrix.kind }}.diff
          retention-days: 1

  comment:
    name: Flate - Comment
    permissions:
      contents: read
      pull-requests: write
    needs: flate
    if: ${{ !cancelled() && needs.flate.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download diffs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          pattern: flate-diff-*

      - name: Load Secrets
        id: load-secrets
        if: ${{ hashFiles('helmrelease.diff', 'kustomization.diff') != '' }}
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1 # zizmor: ignore[unpinned-tools]
        env:
          GITHUB_BOT_APP_CLIENT_ID: op://area0/github-bot/GITHUB_BOT_APP_CLIENT_ID
          GITHUB_BOT_APP_PRIVATE_KEY: op://area0/github-bot/GITHUB_BOT_APP_PRIVATE_KEY
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Generate token
        id: app-token
        if: ${{ hashFiles('helmrelease.diff', 'kustomization.diff') != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_CLIENT_ID }}
          permission-pull-requests: write
          private-key: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_PRIVATE_KEY }}

      - name: Add or Update Comment
        if: ${{ hashFiles('helmrelease.diff', 'kustomization.diff') != '' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const read = (path) => { try { return fs.readFileSync(path, 'utf8'); } catch { return ''; } };
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const marker = `<!-- flate -->`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const diffs = {
              Kustomization: read("kustomization.diff"),
              HelmRelease: read("helmrelease.diff"),
            };
            const LIMIT = 65000; // GitHub caps comment bodies at 65,536; leave headroom

            const inlineSection = (label, diff) => [
              `<details open><summary>${label} diff</summary>`,
              ``,
              "```diff",
              diff,
              "```",
              ``,
              `</details>`,
            ];
            const linkedSection = (label, diff) => [
              `<details><summary>${label} diff (${diff.length.toLocaleString()} chars — too large to post)</summary>`,
              ``,
              `Diff exceeds GitHub's comment size limit. Download the artifact from the [workflow run](${runUrl}).`,
              ``,
              `</details>`,
            ];

            // Inline every diff, then evict the largest to a link until the whole
            // comment fits — so a small diff never bumps a big one off inline.
            const present = Object.entries(diffs).filter(([, diff]) => diff.trim());
            const linked = new Set();
            const render = () => [
              marker,
              ...present.flatMap(([label, diff]) =>
                linked.has(label) ? linkedSection(label, diff) : inlineSection(label, diff)),
              ``,
              `<sub>Diff created by [flate](https://github.com/home-operations/flate) — [Workflow run](${runUrl})</sub>`,
            ].join("\n");
            for (const [label] of [...present].sort((a, b) => b[1].length - a[1].length)) {
              if (render().length <= LIMIT) break;
              linked.add(label);
            }

            const body = render();

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  success:
    name: Flate - Success
    needs:
      - flate
      - comment
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
