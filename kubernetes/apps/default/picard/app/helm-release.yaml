---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: picard
spec:
  chartRef:
    kind: OCIRepository
    name: picard
  interval: 1h
  values:
    controllers:
      picard:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            env:
              DARK_MODE: "1"
              GROUP_ID: ${APP_PGID:=1000}
              TZ: "${CLUSTER_TIME_ZONE}"
              USER_ID: ${APP_PUID:=1000}
              WEB_AUDIO: "1"
              WEB_LISTENING_PORT: &port 5800
            image:
              repository: ghcr.io/jlesage/musicbrainz-picard
              tag: v26.02.2@sha256:46d1f7b1dff908f23bd27a9c017287ec2b11ee86b6ee3b15f7cb89ae35a034c9
            resources:
              limits:
                memory: 1Gi
              requests:
                cpu: 10m
            # securityContext:
            #   allowPrivilegeEscalation: false
            #   capabilities:
            #     drop:
            #       - "ALL"
            #   readOnlyRootFilesystem: true
        replicas: ${REPLICAS:=1}
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        fsGroup: ${APP_PGID:=1000}
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: ${APP_PGID:=1000}
        runAsUser: ${APP_PUID:=1000}
    persistence:
      config:
        existingClaim: "${VOLSYNC_PVC:=${APP}}"
        globalMounts:
          - path: /config
      nas-data:
        advancedMounts:
          picard:
            app:
              - path: /storage
                subPath: media/audio
                readOnly: true
        path: "${NFS_DATA_PATH}"
        server: "${NAS_ADDRESS}"
        type: nfs
    route:
      app:
        hostnames:
          - "${HOSTNAME:=${APP}}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      app:
        ports:
          http:
            port: *port
