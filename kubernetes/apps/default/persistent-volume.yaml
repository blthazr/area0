---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: default-local-storage
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 1Mi
  local:
    path: /var/mnt/media
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8s-5
  persistentVolumeReclaimPolicy: Retain
  storageClassName: default-local-storage
