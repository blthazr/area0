---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    analytics:
      check_for_plugin_updates: "false"
      check_for_updates: "false"
      feedback_links_enabled: "false"
      reporting_enabled: "false"
    auth.generic_oauth:
      allow_assign_grafana_admin: "true"
      allow_sign_up: "true"
      enabled: "true"
      icon: signin
      name: Pocket ID
      role_attribute_path: |
        contains(groups[*], 'grafana_admins') && 'Admin' || contains(groups[*], 'grafana_users') && 'Viewer'
      scopes: openid profile email groups
      use_pkce: "true"
    date_formats:
      default_timezone: CST
      use_browser_locale: "true"
      week_start: monday
    log:
      mode: console
    metrics:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    plugins:
      plugin_admin_enabled: "false"
    server:
      enable_gzip: "true"
      root_url: "https://${HOSTNAME:=${APP}}.${SECRET_DOMAIN}"
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        metadata:
          annotations:
            secret.reloader.stakater.com/reload: grafana-oidc-credentials,grafana-secret
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_AUTH_GENERIC_OAUTH_API_URL
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oidc-credentials
                      key: userinfo_url
                - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oidc-credentials
                      key: authorization_url
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oidc-credentials
                      key: client_id
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oidc-credentials
                      key: client_secret
                - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oidc-credentials
                      key: token_url
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GRAFANA_ADMIN_USERNAME
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GRAFANA_ADMIN_PASSWORD
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - "ALL"
                readOnlyRootFilesystem: true
          securityContext:
            fsGroup: ${APP_PGID:=1000}
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: ${APP_PGID:=1000}
            runAsNonRoot: true
            runAsUser: ${APP_PUID:=1000}
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
  disableDefaultSecurityContext: All
  httpRoute:
    metadata:
      annotations:
        gatus.home-operations.com/endpoint: |-
          name: grafana
          url: https://grafana.${SECRET_DOMAIN}/api/health
    spec:
      hostnames:
        - "${HOSTNAME:=${APP}}.${SECRET_DOMAIN}"
      parentRefs:
        - name: envoy-internal
          namespace: network
      rules:
        - backendRefs:
            - name: grafana-service
              port: 3000
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: ceph-block
