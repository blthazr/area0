---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cribl-stream-workergroup
spec:
  chart:
    spec:
      chart: logstream-workergroup
      sourceRef:
        kind: HelmRepository
        name: cribl
        namespace: observability
      version: 4.13.2
  install:
    remediation:
      retries: -1
  interval: 1h
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
    config:
      group: default
      host: cribl-leader-internal
      token: "${SECRET_CRIBL_LEADER_TOKEN}"
    criblImage:
      repository: cribl/cribl
      tag: 4.13.2@sha256:df471a2debe6dda3aed71aeb24d2e359d23a54a2e47f660dde0196e897366e68
    resources:
      limits:
        cpu: 2000m
        memory: 4096Mi
      requests:
        cpu: 1250m
        memory: 256Mi
    service:
      loadBalancerIP: "${SVC_CRIBL_WORKER}"
      ports:
        - name: talos-kernel
          port: 7601
          protocol: UDP
        - name: talos-service
          port: 7602
          protocol: UDP
        - name: syslog-tcp
          port: 9514
          protocol: TCP
        - name: syslog-udp
          port: 9514
          protocol: UDP
        - name: syslog-unifi
          port: 9520
          protocol: UDP
        - name: splunk-hec
          port: 8088
          protocol: TCP
        - name: s2s
          port: 9997
          protocol: TCP
        - name: cribl-http
          port: 10200
          protocol: TCP
        - name: cribl-tcp
          port: 10300
          protocol: TCP
      type: LoadBalancer
