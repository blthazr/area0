---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cribl-stream-workergroup
spec:
  chart:
    spec:
      chart: logstream-workergroup
      sourceRef:
        kind: HelmRepository
        name: cribl-stream-workergroup
        namespace: observability
      version: 4.14.1
  interval: 1h
  values:
    autoscaling:
      enabled: false
    config:
      group: default
      host: cribl-leader-internal
      token: "${CRIBL_LEADER_TOKEN}"
    criblImage:
      repository: cribl/cribl
      tag: 4.18.2@sha256:85105d061239268fd0c3a46dec7f7ac087fda9d8da6e64e9781d4d2cfff68d1b
    replicaCount: ${REPLICAS:=1}
    resources:
      limits:
        memory: 4Gi
      requests:
        cpu: 100m
        memory: 256Mi
    service:
      loadBalancerIP: "${SVC_CRIBL_WORKER}"
      ports:
        - name: syslog-tcp
          port: 9514
          protocol: TCP
        - name: syslog-udp
          port: 9514
          protocol: UDP
        - name: syslog-unifi
          port: 9520
          protocol: UDP
        - name: splunk-hec
          port: 8088
          protocol: TCP
        - name: s2s
          port: 9997
          protocol: TCP
        - name: cribl-http
          port: 10200
          protocol: TCP
        - name: cribl-tcp
          port: 10300
          protocol: TCP
        - name: http
          port: 10080
          protocol: TCP
      type: LoadBalancer
