---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus-sidecar
spec:
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
  interval: 1h
  values:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
    config:
      existingConfigMap: "{{ .Release.Name }}-configmap"
      items:
        - key: config.yaml
          path: config.yaml
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      delayStartSeconds: "5"
      env:
        TZ: "${CLUSTER_TIME_ZONE}"
      envFrom:
        - secretRef:
            name: "{{ .Release.Name }}-secret"
    httpRoute:
      annotations:
        gatus.home-operations.com/enabled: "false"
      enabled: true
      hostnames:
        - "${HOSTNAME:=${APP}}.${SECRET_DOMAIN}"
      parentRefs:
        - name: envoy-external
          namespace: network
        - name: envoy-internal
          namespace: network
    initContainers:
      init-db:
        envFrom:
          - secretRef:
              name: "{{ .Release.Name }}-secret"
        image:
          repository: ghcr.io/onedr0p/postgres-init
          tag: 17.4@sha256:43dd04e91e861cf912378bad987afa168fa4f13d05528304907ad0aa351195d6
    monitoring:
      serviceMonitor:
        enabled: true
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ceph-block
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
    sidecar:
      kinds:
        httproute:
          auto: true
          enable: true
        service:
          enable: true
