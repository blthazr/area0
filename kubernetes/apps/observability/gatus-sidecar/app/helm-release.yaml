---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus-sidecar
spec:
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
  interval: 1h
  values:
    config:
      existingConfigMap: "{{ .Release.Name }}-configmap"
      items:
        - key: config.yaml
          path: config.yaml
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      delayStartSeconds: "5"
      env:
        TZ: "${CLUSTER_TIME_ZONE}"
      envFrom: &envFrom
        - secretRef:
            name: "{{ .Release.Name }}-secret"
    httpRoute:
      annotations:
        gatus.home-operations.com/enabled: "false"
      enabled: true
      hostnames:
        - "${HOSTNAME:=${APP}}.${SECRET_DOMAIN}"
      parentRefs:
        - name: envoy-external
          namespace: network
        - name: envoy-internal
          namespace: network
    initContainers:
      - name: init-db
        envFrom: *envFrom
        image: ghcr.io/home-operations/postgres-init:17.4@sha256:a9f405688344a8a6f718e2c344438342ad21540986aeb5ab5fa781831eb2c597
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
    sidecar:
      kinds:
        httproute:
          auto: true
          enable: true
        service:
          enable: true
