---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole-dns
spec:
  chartRef:
    kind: OCIRepository
    name: pihole-dns
  interval: 1h
  values:
    domainFilters:
      - "${SECRET_DOMAIN}"
    env:
      - name: EXTERNAL_DNS_PIHOLE_SERVER
        value: "http://${PI_HOLE_ADDRESS}"
      - name: &name EXTERNAL_DNS_PIHOLE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: &secret pihole-dns-secret
            key: *name
    extraArgs:
      - --annotation-filter=external-dns.alpha.kubernetes.io/internal notin (false,no)
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --gateway-name=envoy-internal
      - --pihole-api-version=6
    fullnameOverride: "${APP}"
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
    policy: sync
    provider:
      name: pihole
    registry: noop
    serviceMonitor:
      enabled: true
    sources:
      - crd
      - gateway-httproute
      - service
    triggerLoopOnEvent: true
