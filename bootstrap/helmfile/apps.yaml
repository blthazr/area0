---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

# Bootstraps core applications that provide a minimal runtime base for the
# cluster. These releases are installed first so the cluster has the resources
# Flux needs before its own reconciliation begins.
#
# After this bootstrap phase, Flux is ready to take over management of the
# application stack and continue reconciling downstream state.

helmDefaults:
  cleanupOnFail: true
  forceConflicts: true
  wait: true
  waitForJobs: true

bases:
  - default.yaml

defaultInherit: default

releases:
  - name: cilium
    hooks:
      - # Wait for CRDs to be available
        args:
          - wait
          - --for=create
          # - crd/ciliumbgpadvertisements.cilium.io
          # - crd/ciliumbgpclusterconfigs.cilium.io
          # - crd/ciliumbgppeerconfigs.cilium.io
          - crd/ciliumloadbalancerippools.cilium.io
          - --timeout=2m
        command: kubectl
        events:
          - postsync
        showlogs: true
      - # Apply resources
        args:
          - apply
          - --namespace={{ .Release.Namespace }}
          - --server-side
          - --field-manager=kustomize-controller
          - --force-conflicts
          - --kustomize
          - ../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/config
        command: kubectl
        events:
          - postsync
        showlogs: true
    namespace: kube-system

  - name: coredns
    namespace: kube-system
    needs:
      - kube-system/cilium

  - name: spegel
    namespace: kube-system
    needs:
      - kube-system/coredns

  - name: cert-manager
    namespace: cert-manager
    needs:
      - kube-system/spegel

  - name: external-secrets
    namespace: external-secrets
    needs:
      - cert-manager/cert-manager

  - name: onepassword-connect
    hooks:
      - # Wait for CRDs to be available
        args:
          - wait
          - --for=create
          - crd/clustersecretstores.external-secrets.io
          - --timeout=2m
        command: kubectl
        events:
          - postsync
        showlogs: true
      - # Apply resources
        args:
          - apply
          - --server-side
          - --force-conflicts
          - --filename
          - ../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/cluster-secret-store.yaml
        command: kubectl
        events:
          - postsync
        showlogs: true
    namespace: external-secrets
    needs:
      - external-secrets/external-secrets

  - name: flux-operator
    namespace: flux-system
    needs:
      - external-secrets/onepassword-connect

  - name: flux-instance
    namespace: flux-system
    needs:
      - flux-system/flux-operator
