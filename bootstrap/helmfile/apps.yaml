---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

# Bootstraps core applications that provide a minimal runtime base for the
# cluster. These releases are installed first so the cluster has the resources
# Flux needs before its own reconciliation begins.
#
# After this bootstrap phase, Flux is ready to take over management of the
# application stack and continue reconciling downstream state.

helmDefaults:
  cleanupOnFail: true
  forceConflicts: true
  wait: true
  waitForJobs: true

bases:
  - default.yaml

defaultInherit: default

releases:
  - name: cilium
    hooks:
      - # Wait for CRDs to be available
        args:
          - wait
          - --for=create
          - crd/ciliumloadbalancerippools.cilium.io
          - --timeout=2m
        command: kubectl
        events:
          - postsync
        showlogs: true
      - # Apply resources
        args:
          - -c
          - |
            kustomize build \
            ../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/config \
            | envsubst \
            | kubectl \
            apply \
            --namespace={{ .Release.Namespace }} \
            --server-side \
            --field-manager=kustomize-controller \
            --filename -
        command: bash
        events:
          - postsync
        showlogs: true
    namespace: kube-system
    set:
      - name: operator.replicas
        value: 1

  - name: coredns
    namespace: kube-system
    needs:
      - kube-system/cilium
    set:
      - name: replicaCount
        value: 1

  - name: cert-manager
    namespace: cert-manager
    needs:
      - kube-system/coredns
    set:
      - name: webhook.replicaCount
        value: 1

  - name: external-secrets
    namespace: external-secrets
    needs:
      - cert-manager/cert-manager

  - name: onepassword-connect
    hooks:
      - # Wait for CRDs to be available
        args:
          - wait
          - --for=create
          - crd/clustersecretstores.external-secrets.io
          - --timeout=2m
        command: kubectl
        events:
          - postsync
        showlogs: true
      - # Apply resources
        args:
          - apply
          - --server-side
          - --force-conflicts
          - --filename
          - ../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/cluster-secret-store.yaml
        command: kubectl
        events:
          - postsync
        showlogs: true
    namespace: external-secrets
    needs:
      - external-secrets/external-secrets

  - name: flux-operator
    namespace: flux-system
    needs:
      - external-secrets/onepassword-connect
    set:
      - name: web.httpRoute.enabled
        value: false

  - name: flux-instance
    namespace: flux-system
    needs:
      - flux-system/flux-operator
