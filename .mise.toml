[env]
# File paths
KUBECONFIG = "{{config_root}}/kubeconfig"
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/infrastructure/talos/clusterconfig/talosconfig"

# Python
_.python.venv = { path = "{{config_root}}/.venv", create = true }

# Ansible
VIRTUAL_ENV = "{{config_root}}/.venv"

[settings]
pipx_uvx = true

[tools]
# kubectl + plugins
"aqua:fluxcd/flux2" = "2.8.5"
"aqua:helm/helm" = "4.1.3"
"aqua:helmfile/helmfile" = "1.4.4"
"aqua:kubernetes/kubernetes/kubectl" = "1.35.3"

# talos
"aqua:budimanjojo/talhelper" = "3.1.7"
"aqua:siderolabs/talos" = "1.12.6"

# ansible
"ansible-core" = "2.20.1"

# python
"pipx" = "1.11.1"
"python" = "3.14.4"

# misc
"aqua:FiloSottile/age" = "1.3.1"
"aqua:getsops/sops" = "3.12.2"
"aqua:go-task/task" = "3.49.1"
"aqua:google/yamlfmt" = "0.21.0"
"aqua:jqlang/jq" = "1.8.1"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:mitsuhiko/minijinja" = "2.19.0"
"aqua:stern/stern" = "1.33.1"
"aqua:uutils/coreutils" = "0.8.0"
